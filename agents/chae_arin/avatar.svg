<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" role="img" aria-label="채아린 placeholder avatar">
  <!--
    Placeholder avatar for 채아린 (companion role).

    Soft pink gradient background + heart silhouette + initial.
    Replace this file with a real portrait (PNG/JPG/WebP work too —
    the auto-loader checks svg/png/jpg/jpeg/webp in that order).
  -->
  <defs>
    <linearGradient id="chaerin-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffb1c8"/>
      <stop offset="100%" stop-color="#ff6f9e"/>
    </linearGradient>
  </defs>
  <rect width="96" height="96" rx="24" fill="url(#chaerin-bg)"/>
  <!-- Heart silhouette (white, low opacity, centered) -->
  <path
    d="M48 76 C16 56 16 28 32 24 C40 22 46 28 48 34 C50 28 56 22 64 24 C80 28 80 56 48 76 Z"
    fill="#ffffff"
    fill-opacity="0.35"
  />
  <!-- Initial "채" in white, bold, centered -->
  <text
    x="48"
    y="55"
    text-anchor="middle"
    font-family="-apple-system, 'SF Pro Display', system-ui, 'Apple SD Gothic Neo', 'Segoe UI', sans-serif"
    font-size="36"
    font-weight="800"
    fill="#ffffff"
    letter-spacing="-1"
  >채</text>
</svg>
