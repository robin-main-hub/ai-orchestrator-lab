    speaker: architect
    tag: risk
    text: 지금 편한 결합은 미래의 족쇄다. 특히 orchestration과 memory는 분리해야 한다.
  - round: 5
    speaker: mediator
    tag: agreement
    text: 정리하겠습니다. 한쪽은 속도를, 다른 한쪽은 안전을 요구합니다. 둘 다 같은 문제를 보고 있습니다.
  - round: 6
    speaker: yohane
