    speaker: negotiator
    tag: evidence
    text: 자, 1막입니다. Acme가 말하는 20% 할인은 가격이 아니라 내부 승인 명분을 달라는 가면이에요.
  - round: 2
    speaker: reviewer
    tag: objection
    text: 무조건 할인은 품위가 없습니다. 사용 기간, 좌석 수, 레퍼런스 범위를 묶어야 전략이 됩니다.
  - round: 3
    speaker: risk_officer
    tag: risk
    text: 그 양보는 다음 계약의 기준가가 된다. 피자 한 판처럼 오늘만 먹고 끝나는 문제가 아니다.
  - round: 4
    speaker: external
    tag: agreement
    text: 좋아, 메시지는 이렇게 가자. ‘20% 대신 연간 선결제와 공개 가능한 성과 지표 조건에서 12%’.
  - round: 5
    speaker: orchestrator
    tag: agreement
    text: 그 안으로 갑니다. 더 낮추지 마세요.
  expected_resolution: 근거, 위험, 구현 영향을 분리해 다음 행동 1개와 보류 조건 1개를 남긴다. 안전 규칙이 충돌하면 안전 규칙을 우선한다.
